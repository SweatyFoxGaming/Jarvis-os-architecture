services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: jarvis-postgres
    environment:
      POSTGRES_USER: jarvis_user
      POSTGRES_PASSWORD: DeathByTouch23063003
      POSTGRES_DB: jarvis
    volumes:
      - /mnt/jarvis_home/postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jarvis_user -d jarvis"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  tts:
    image: travisvn/openai-edge-tts:latest
    container_name: jarvis-tts
    environment:
      API_KEY: JarvisVoice063003
    ports:
      - "5051:5050"
    restart: unless-stopped

  api:
    build: .
    container_name: jarvis-api
    depends_on:
      postgres:
        condition: service_healthy
      tts:
        condition: service_started
    command: uvicorn src.api:app --host 0.0.0.0 --port 8000 --reload
    environment:
      PG_HOST: postgres
      PG_PORT: 5432
      PG_DATABASE: jarvis
      PG_USER: jarvis_user
      PG_PASSWORD: DeathByTouch23063003
      PG_USE_POSTGRES: "true"
      TTS_URL: http://tts:5050/v1/audio/speech
      TTS_API_KEY: JarvisVoice063003
      INTERNAL_API_KEY: c44dcd566e20d12f361464fb83c3734e02c60dbfd8b4f75e9a98f24d63c24918
      OPENAI_API_KEY: your_openai_key
      BRAVE_API_KEY: BSAmhR741RytAV2T4q4RuZ3-vzKnL4N
      EMAIL_HOST: smtp.gmail.com
      EMAIL_PORT: 587
      EMAIL_USER: chadadamsn@gmail.com
      EMAIL_PASSWORD: DeathByTouch23!063003
      IMAP_HOST: imap.gmail.com
      IMAP_PORT: 993
      GITHUB_TOKEN: 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
      NEWS_API_KEY: a0be4e78219849cb8a2d200af451e654
      N_CTX: 4096
      N_BATCH: 512
      N_THREADS: 4
      SEMANTIC_SEARCH_LIMIT: 2
      MAX_TOOL_ITERATIONS: 2
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - /mnt/jarvis_home/models:/app/models
      - /mnt/jarvis_home/data:/app/data
      - /mnt/jarvis_home/logs:/app/logs
      - /home/ubuntu/.ssh:/root/.ssh:ro 
    restart: unless-stopped
