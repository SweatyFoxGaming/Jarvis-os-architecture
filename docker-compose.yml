services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: jarvis-postgres
    environment:
      POSTGRES_USER: jarvis_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: jarvis
    volumes:
      - /mnt/jarvis_home/postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jarvis_user -d jarvis"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  tts:
    image: travisvn/openai-edge-tts:latest
    container_name: jarvis-tts
    environment:
      API_KEY: ${TTS_API_KEY}
    ports:
      - "5051:5050"
    restart: unless-stopped

  api:
    build: .
    container_name: jarvis-api
    depends_on:
      postgres:
        condition: service_healthy
      tts:
        condition: service_started
    command: uvicorn src.api:app --host 0.0.0.0 --port 8000   # --reload removed
    env_file: .env
    environment:
      # Database
      PG_HOST: postgres
      PG_PORT: 5432
      PG_DATABASE: jarvis
      PG_USER: jarvis_user
      PG_PASSWORD: ${PG_PASSWORD}
      PG_USE_POSTGRES: "true"

      # TTS
      TTS_URL: http://tts:5050/v1/audio/speech
      TTS_API_KEY: ${TTS_API_KEY}

      # API Keys
      INTERNAL_API_KEY: ${INTERNAL_API_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      BRAVE_API_KEY: ${BRAVE_API_KEY}
      GITHUB_TOKEN: ${GITHUB_TOKEN}
      NEWS_API_KEY: ${NEWS_API_KEY}
      HF_TOKEN: ${HF_TOKEN}

      # Email (SMTP/IMAP)
      EMAIL_HOST: ${EMAIL_HOST:-smtp.gmail.com}
      EMAIL_PORT: ${EMAIL_PORT:-587}
      EMAIL_USER: ${EMAIL_USER}
      EMAIL_PASSWORD: ${EMAIL_PASSWORD}
      IMAP_HOST: ${IMAP_HOST:-imap.gmail.com}
      IMAP_PORT: ${IMAP_PORT:-993}

      # Model & hardware
      MODEL_PATH: ${MODEL_PATH}
      N_CTX: ${N_CTX:-4096}
      N_BATCH: ${N_BATCH:-512}
      N_THREADS: ${N_THREADS:-4}
      HARDWARE_PROFILE: ${HARDWARE_PROFILE:-performance}

      # Memory
      SEMANTIC_SEARCH_ENABLED: ${SEMANTIC_SEARCH_ENABLED:-true}
      SEMANTIC_SEARCH_LIMIT: ${SEMANTIC_SEARCH_LIMIT:-5}
      MAX_TOOL_ITERATIONS: ${MAX_TOOL_ITERATIONS:-5}
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - /mnt/jarvis_home/models:/app/models
      - /mnt/jarvis_home/data:/app/data
      - /mnt/jarvis_home/logs:/app/logs
      - /home/ubuntu/.ssh:/root/.ssh:ro
      - ./src:/app/src
      - /home/ubuntu/Downloads:/app/host_models 
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
