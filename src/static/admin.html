<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JARVIS Admin Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #0a0c10;
            color: #e0e0e0;
            font-family: 'Segoe UI', 'Roboto', sans-serif;
            padding: 20px;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 24px;
            background: #13171d;
            border-radius: 12px;
            border: 1px solid #2a2f3a;
            margin-bottom: 24px;
        }
        .header h1 {
            font-size: 24px;
            background: linear-gradient(135deg, #00b4d8, #0077b6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .header .status {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .header .dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            display: inline-block;
        }
        .dot.online { background: #00e676; }
        .dot.offline { background: #ff5252; }
        .card {
            background: #13171d;
            border: 1px solid #2a2f3a;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
        }
        .card h2 {
            font-size: 18px;
            font-weight: 500;
            color: #9aa9b9;
            margin-bottom: 12px;
        }
        .pending-item {
            background: #0d1117;
            padding: 12px 16px;
            border-radius: 8px;
            border: 1px solid #1a1f26;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }
        .pending-item .content {
            flex: 1;
            min-width: 200px;
        }
        .pending-item .content .source {
            font-size: 12px;
            color: #6a7a8a;
        }
        .pending-item .actions button {
            margin-left: 6px;
            padding: 4px 12px;
            border-radius: 4px;
            border: none;
            cursor: pointer;
            font-weight: 500;
        }
        .btn-approve {
            background: #00e676;
            color: #000;
        }
        .btn-reject {
            background: #ff5252;
            color: #fff;
        }
        .btn-approve-all {
            background: #1a73e8;
            color: #fff;
            padding: 8px 16px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }
        .btn-approve-all:hover {
            background: #2b7ff0;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 12px;
        }
        .stat-box {
            background: #0d1117;
            padding: 12px 16px;
            border-radius: 8px;
            border: 1px solid #1a1f26;
            text-align: center;
        }
        .stat-box .number {
            font-size: 28px;
            font-weight: 600;
            color: #00b4d8;
        }
        .stat-box .label {
            font-size: 12px;
            color: #6a7a8a;
            margin-top: 4px;
        }
        .error {
            color: #ff5252;
            padding: 12px;
            background: #1a0a0a;
            border-radius: 8px;
            margin-bottom: 12px;
        }
        .success {
            color: #00e676;
            padding: 12px;
            background: #0a1a0a;
            border-radius: 8px;
            margin-bottom: 12px;
        }
        #loading {
            text-align: center;
            padding: 40px;
            color: #6a7a8a;
        }
        .hidden { display: none; }
        .flex { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
        input[type="password"] {
            background: #0d1117;
            border: 1px solid #2a3a4a;
            color: #e0e0e0;
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 14px;
            flex: 1;
            min-width: 200px;
        }
        button {
            padding: 8px 16px;
            border-radius: 6px;
            border: none;
            background: #1a73e8;
            color: #fff;
            font-weight: 500;
            cursor: pointer;
        }
        button:hover {
            background: #2b7ff0;
        }
    </style>
</head>
<body>

<div class="header">
    <h1>⚙️ JARVIS Admin Dashboard</h1>
    <div class="status">
        <span class="dot online" id="statusDot"></span>
        <span id="statusLabel">Loading...</span>
    </div>
</div>

<div id="authSection" class="card">
    <h2>🔑 API Key</h2>
    <div class="flex">
        <input type="password" id="apiKeyInput" placeholder="Enter your X-API-Key" />
        <button id="authBtn">Connect</button>
    </div>
</div>

<div id="dashboard" class="hidden">
    <div class="stats-grid" id="statsGrid">
        <div class="stat-box"><div class="number" id="pendingCount">—</div><div class="label">Pending Records</div></div>
        <div class="stat-box"><div class="number" id="totalMemory">—</div><div class="label">Total Memory</div></div>
        <div class="stat-box"><div class="number" id="engineStatus">—</div><div class="label">Engine Status</div></div>
        <div class="stat-box"><div class="number" id="consolidationInterval">—</div><div class="label">Consolidation (min)</div></div>
    </div>

    <div class="card">
        <div class="flex" style="justify-content:space-between;">
            <h2>📋 Pending Records</h2>
            <button id="approveAllBtn" class="btn-approve-all">✅ Approve All</button>
        </div>
        <div id="pendingList">
            <div id="loading">Loading pending records...</div>
        </div>
    </div>

    <div id="messageContainer"></div>
</div>

<script>
    // ---------- State ----------
    let apiKey = sessionStorage.getItem('admin_api_key') || '';
    let pendingRecords = [];

    // ---------- DOM refs ----------
    const authSection = document.getElementById('authSection');
    const dashboard = document.getElementById('dashboard');
    const apiKeyInput = document.getElementById('apiKeyInput');
    const authBtn = document.getElementById('authBtn');
    const statusDot = document.getElementById('statusDot');
    const statusLabel = document.getElementById('statusLabel');
    const pendingList = document.getElementById('pendingList');
    const approveAllBtn = document.getElementById('approveAllBtn');
    const messageContainer = document.getElementById('messageContainer');

    const pendingCountEl = document.getElementById('pendingCount');
    const totalMemoryEl = document.getElementById('totalMemory');
    const engineStatusEl = document.getElementById('engineStatus');
    const consolidationIntervalEl = document.getElementById('consolidationInterval');

    // ---------- Helpers ----------
    function setStatus(online) {
        statusDot.className = 'dot ' + (online ? 'online' : 'offline');
        statusLabel.textContent = online ? 'Online' : 'Offline';
    }

    function showMessage(text, type = 'success') {
        const div = document.createElement('div');
        div.className = type;
        div.textContent = text;
        messageContainer.appendChild(div);
        setTimeout(() => div.remove(), 5000);
    }

    async function apiCall(endpoint, options = {}) {
        const headers = {
            'Content-Type': 'application/json',
            'X-API-Key': apiKey,
            ...(options.headers || {})
        };
        const res = await fetch(endpoint, { ...options, headers });
        if (!res.ok) {
            const err = await res.text();
            throw new Error(`HTTP ${res.status}: ${err}`);
        }
        return res.json();
    }

    // ---------- Auth ----------
    function authenticate() {
        const key = apiKeyInput.value.trim();
        if (!key) {
            showMessage('Please enter an API key.', 'error');
            return;
        }
        apiKey = key;
        sessionStorage.setItem('admin_api_key', key);
        authSection.classList.add('hidden');
        dashboard.classList.remove('hidden');
        loadDashboard();
    }

    // ---------- Load Dashboard ----------
    async function loadDashboard() {
        try {
            setStatus(false);
            // Fetch pending records
            const pending = await apiCall('/api/memory/pending');
            pendingRecords = pending;
            renderPending(pending);

            // Fetch consolidation status
            const statusData = await apiCall('/api/admin/consolidation/status');
            pendingCountEl.textContent = statusData.pending_records || 0;
            consolidationIntervalEl.textContent = statusData.interval_minutes || '—';
            engineStatusEl.textContent = 'Online';

            // Health check
            const health = await fetch('/health').then(r => r.json());
            engineStatusEl.textContent = health.engine_ready ? 'Online' : 'Offline';
            setStatus(health.engine_ready);

            // Total memory (approximate via PostgreSQL)
            // We can use a count from memory table – we'll add later
            totalMemoryEl.textContent = '?'; // placeholder
        } catch (err) {
            console.error('Dashboard load error:', err);
            showMessage('Failed to load dashboard: ' + err.message, 'error');
            setStatus(false);
        }
    }

    // ---------- Render Pending ----------
    function renderPending(records) {
        if (!records || records.length === 0) {
            pendingList.innerHTML = '<p style="color:#6a7a8a;">✅ No pending records.</p>';
            return;
        }
        const list = records.map(rec => {
            const content = typeof rec.content === 'string' ? rec.content : JSON.stringify(rec.content);
            return `
            <div class="pending-item" data-uuid="${rec.uuid}">
                <div class="content">
                    <div>${content.substring(0, 150)}${content.length > 150 ? '...' : ''}</div>
                    <div class="source">Source: ${rec.source || 'unknown'} • Importance: ${rec.importance || '—'}</div>
                </div>
                <div class="actions">
                    <button class="btn-approve" onclick="verifyRecord('${rec.uuid}', true)">✅ Approve</button>
                    <button class="btn-reject" onclick="verifyRecord('${rec.uuid}', false)">❌ Reject</button>
                </div>
            </div>
            `;
        }).join('');
        pendingList.innerHTML = list;
    }

    // ---------- Verify Record ----------
    async function verifyRecord(uuid, approve) {
        try {
            await apiCall(`/api/memory/verify/${uuid}?approve=${approve}`, { method: 'POST' });
            showMessage(`Record ${approve ? 'approved' : 'rejected'} successfully.`, 'success');
            // Reload pending list
            loadDashboard();
        } catch (err) {
            showMessage('Error: ' + err.message, 'error');
        }
    }

    // ---------- Approve All ----------
    async function approveAll() {
        if (!confirm('Approve all pending records?')) return;
        try {
            await apiCall('/api/memory/verify_all?approve=true', { method: 'POST' });
            showMessage('All pending records approved.', 'success');
            loadDashboard();
        } catch (err) {
            showMessage('Error: ' + err.message, 'error');
        }
    }

    // ---------- Event Listeners ----------
    authBtn.addEventListener('click', authenticate);
    apiKeyInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') authenticate();
    });
    approveAllBtn.addEventListener('click', approveAll);

    // ---------- Auto-login if key exists ----------
    if (apiKey) {
        apiKeyInput.value = apiKey;
        authenticate();
    } else {
        authSection.classList.remove('hidden');
        dashboard.classList.add('hidden');
        setStatus(false);
    }

    // Refresh dashboard every 30 seconds
    setInterval(() => {
        if (apiKey) loadDashboard();
    }, 30000);
</script>
</body>
</html>
