<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JARVIS - Supreme Sovereign</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=JetBrains+Mono:wght@400;700&display=swap');

        :root {
            --bg-color: #020408;
            --panel-bg: rgba(10, 14, 20, 0.9);
            --accent-cyan: #00f2ff;
            --accent-magenta: #ff00ff;
            --accent-gold: #ffcc00;
            --glow-shadow: 0 0 15px rgba(0, 242, 255, 0.3);
        }

        body {
            background-color: var(--bg-color);
            color: #e6edf3;
            font-family: 'JetBrains Mono', monospace;
            background-image:
                radial-gradient(circle at 50% 50%, rgba(0, 242, 255, 0.05) 0%, transparent 50%),
                linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%),
                linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 100%, 100% 2px, 3px 100%;
        }

        .cyber-panel {
            background: var(--panel-bg);
            border: 1px solid rgba(0, 242, 255, 0.2);
            backdrop-filter: blur(10px);
            box-shadow: var(--glow-shadow);
        }

        .aura-ring {
            border: 2px solid var(--accent-cyan);
            border-radius: 50%;
            width: 50px;
            height: 50px;
            box-shadow: 0 0 20px var(--accent-cyan);
            animation: aura-pulse 4s infinite ease-in-out;
        }

        @keyframes aura-pulse {
            0%, 100% { transform: scale(1) rotate(0deg); opacity: 0.8; box-shadow: 0 0 15px var(--accent-cyan); border-color: var(--accent-cyan); }
            33% { transform: scale(1.1) rotate(120deg); opacity: 1; box-shadow: 0 0 30px var(--accent-magenta); border-color: var(--accent-magenta); }
            66% { transform: scale(1.05) rotate(240deg); opacity: 0.9; box-shadow: 0 0 25px var(--accent-gold); border-color: var(--accent-gold); }
        }

        .glitch-text { font-family: 'Orbitron', sans-serif; text-transform: uppercase; letter-spacing: 4px; }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--accent-cyan); border-radius: 10px; }
    </style>
</head>
<body class="h-screen flex flex-col p-4 overflow-hidden">
    <!-- Top HUD -->
    <nav class="flex justify-between items-center mb-4 px-2">
        <div class="flex items-center gap-6">
            <div class="aura-ring"></div>
            <div>
                <h1 class="glitch-text text-2xl text-cyan-400 font-bold">JARVIS</h1>
                <p class="text-[10px] text-gray-500 tracking-[0.3em]">SUPREME SOVEREIGN OVERSEER</p>
            </div>
        </div>
        <div class="cyber-panel px-6 py-2 rounded-full flex gap-8 text-[11px] border-cyan-900/50">
            <div class="flex flex-col"><span class="text-gray-500">CPU</span><span id="cpu-val" class="text-cyan-400">0%</span></div>
            <div class="flex flex-col"><span class="text-gray-500">RAM</span><span id="ram-val" class="text-magenta-400">0MB</span></div>
            <div class="flex flex-col"><span class="text-gray-500">SYSTEM</span><span class="text-green-400">STABLE</span></div>
        </div>
    </nav>

    <div class="flex-1 flex gap-4 overflow-hidden">
        <!-- Main Chat Area -->
        <section class="flex-[3] flex flex-col cyber-panel rounded-xl overflow-hidden relative">
            <div class="absolute top-0 left-0 w-full h-[1px] bg-gradient-to-r from-transparent via-cyan-500 to-transparent"></div>

            <div id="chat-container" class="flex-1 overflow-y-auto p-6 space-y-6">
                <div class="flex gap-4 items-start animate-fade-in">
                    <div class="w-8 h-8 rounded bg-cyan-900 flex items-center justify-center text-[10px] text-cyan-400 border border-cyan-500">SYS</div>
                    <div class="flex-1 text-sm leading-relaxed text-cyan-100">Neural link established. Awaiting directives.</div>
                </div>
            </div>

            <div class="p-6 bg-black/40 border-t border-gray-800">
                <div class="flex gap-4 bg-gray-900/50 p-2 rounded-lg border border-gray-700 focus-within:border-cyan-500 transition-all">
                    <input id="chat-input" type="text" class="flex-1 bg-transparent border-none outline-none p-2 text-sm" placeholder="COMMAND JARVIS...">
                    <button onclick="sendChat()" class="bg-cyan-500/10 hover:bg-cyan-500/20 text-cyan-400 px-6 py-2 rounded font-bold text-xs border border-cyan-500/50 uppercase tracking-widest">SEND</button>
                </div>
            </div>
        </section>

        <!-- Sidebar Diagnostics -->
        <aside class="flex-1 flex flex-col gap-4 overflow-hidden">
            <div class="cyber-panel rounded-xl p-4 flex flex-col h-1/2">
                <h3 class="text-[10px] font-bold text-gray-500 mb-4 tracking-widest">CORE KNOWLEDGE</h3>
                <div id="knowledge-base" class="space-y-3 overflow-y-auto flex-1 pr-2">
                    <!-- Dynamic -->
                </div>
            </div>
            <div class="cyber-panel rounded-xl p-4 flex flex-col h-1/2 border-magenta-900/30">
                <h3 class="text-[10px] font-bold text-gray-500 mb-4 tracking-widest">LOG TRACE</h3>
                <div id="log-trace" class="text-[10px] space-y-1 text-gray-400 overflow-y-auto flex-1 font-mono">
                    <div>[08:42] Kernel initializing...</div>
                    <div>[08:42] Memory modules loaded.</div>
                </div>
            </div>
        </aside>
    </div>

    <script>
        const container = document.getElementById('chat-container');
        const input = document.getElementById('chat-input');
        const logTrace = document.getElementById('log-trace');

        function addLog(msg) {
            const time = new Date().toLocaleTimeString('en-GB', { hour12: false, hour: '2-digit', minute: '2-digit' });
            const div = document.createElement('div');
            div.innerHTML = `<span class="text-cyan-700">[${time}]</span> ${msg}`;
            logTrace.appendChild(div);
            logTrace.scrollTop = logTrace.scrollHeight;
        }

        function createMessageElement(sender) {
            const isUser = sender === 'YOU';
            const div = document.createElement('div');
            div.className = `flex gap-4 items-start ${isUser ? 'flex-row-reverse' : ''}`;
            div.innerHTML = `
                <div class="w-8 h-8 rounded ${isUser ? 'bg-gray-800 border-gray-600' : 'bg-cyan-900 border-cyan-500'} flex items-center justify-center text-[10px] text-gray-300 border">${sender.substring(0,3)}</div>
                <div class="flex-1 text-sm leading-relaxed ${isUser ? 'text-right' : 'text-cyan-100'} p-1 content-box"></div>
            `;
            container.appendChild(div);
            return div.querySelector('.content-box');
        }

        async function sendChat() {
            const msg = input.value.trim();
            if (!msg) return;
            input.value = '';

            const userContent = createMessageElement('YOU');
            userContent.innerText = msg;
            addLog(`Delegating: ${msg.substring(0, 20)}...`);

            const jarvisContent = createMessageElement('JARVIS');

            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: msg })
                });

                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let buffer = "";

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    buffer += decoder.decode(value, {stream: true});
                    const lines = buffer.split('\n\n');
                    buffer = lines.pop();

                    for (const line of lines) {
                        if (line.startsWith('data: ')) {
                            const token = line.substring(6);
                            if (token === "[DONE]") break;
                            jarvisContent.innerHTML += token.replace(/\n/g, '<br>').replace(/ /g, '&nbsp;');
                            container.scrollTop = container.scrollHeight;
                        }
                    }
                }
                addLog("Response finalized.");
            } catch (err) {
                jarvisContent.innerText = "CRITICAL ERROR: Communication lost.";
                addLog("Link error detected.");
            }
        }

        async function updateHUD() {
            try {
                const res = await fetch('/api/status');
                const data = await res.json();
                document.getElementById('cpu-val').innerText = `${data.cpu}%`;
                document.getElementById('ram-val').innerText = `${data.ram_available}MB`;
            } catch {}
        }

        input.addEventListener('keypress', (e) => { if(e.key === 'Enter') sendChat(); });
        setInterval(updateHUD, 3000);
        updateHUD();
    </script>
</body>
</html>
