<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jarvis OS · The Living Mind</title>
    <script src="https://unpkg.com/cytoscape@3.28.0/dist/cytoscape.min.js"></script>
    <style>
        /* ------------------------------------------------------------------
           THE LIVING MIND – Experimental UI for Jarvis OS
           Design: calm, elegant, futuristic, alive.
           ------------------------------------------------------------------ */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #0a0a12;
            color: #d0d0e0;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            height: 100vh;
            overflow: hidden;
            user-select: none;
        }
        #app {
            display: flex;
            flex-direction: column;
            height: 100vh;
            width: 100vw;
            position: relative;
        }
        /* Graph Area */
        #mind-graph {
            flex: 1;
            width: 100%;
            background: radial-gradient(ellipse at center, #14141e 0%, #0a0a12 100%);
            position: relative;
            overflow: hidden;
        }
        #mind-graph canvas {
            display: block;
            width: 100%;
            height: 100%;
        }
        /* Conversation Panel */
        #conversation-panel {
            position: absolute;
            bottom: 30px;
            right: 30px;
            width: 360px;
            max-height: 300px;
            background: rgba(20, 20, 30, 0.75);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(100, 120, 200, 0.15);
            border-radius: 16px;
            padding: 12px 16px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.6);
            transition: opacity 0.3s ease, transform 0.3s ease;
            z-index: 10;
        }
        #conversation-panel:hover {
            border-color: rgba(120, 160, 255, 0.25);
        }
        #conversation-messages {
            flex: 1;
            max-height: 160px;
            overflow-y: auto;
            margin-bottom: 8px;
            font-size: 0.85rem;
            line-height: 1.5;
            scrollbar-width: thin;
            scrollbar-color: rgba(255,255,255,0.1) transparent;
        }
        #conversation-messages::-webkit-scrollbar {
            width: 4px;
        }
        #conversation-messages::-webkit-scrollbar-thumb {
            background: rgba(255,255,255,0.15);
            border-radius: 4px;
        }
        .message {
            padding: 4px 0;
            opacity: 0.8;
            border-bottom: 1px solid rgba(255,255,255,0.03);
        }
        .message.user {
            color: #8ab4f8;
        }
        .message.assistant {
            color: #e0e8f0;
        }
        #conversation-input {
            display: flex;
            gap: 8px;
            align-items: center;
            border-top: 1px solid rgba(255,255,255,0.05);
            padding-top: 8px;
        }
        #user-input {
            flex: 1;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 20px;
            padding: 6px 14px;
            color: #e0e8f0;
            font-size: 0.85rem;
            outline: none;
            transition: border 0.2s;
        }
        #user-input:focus {
            border-color: rgba(120, 160, 255, 0.4);
        }
        #user-input::placeholder {
            color: rgba(255,255,255,0.2);
        }
        #send-btn {
            background: rgba(120, 160, 255, 0.15);
            border: none;
            border-radius: 50%;
            width: 32px;
            height: 32px;
            color: #8ab4f8;
            font-size: 1.2rem;
            cursor: pointer;
            transition: background 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #send-btn:hover {
            background: rgba(120, 160, 255, 0.25);
        }
        /* Info Panel */
        #info-panel {
            position: absolute;
            top: 40px;
            left: 40px;
            width: 300px;
            max-height: 70vh;
            background: rgba(12, 12, 20, 0.9);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(100, 120, 200, 0.2);
            border-radius: 16px;
            padding: 20px;
            z-index: 20;
            box-shadow: 0 12px 48px rgba(0,0,0,0.8);
            transition: opacity 0.3s ease, transform 0.3s ease;
            overflow-y: auto;
            color: #c0c8d8;
        }
        #info-panel.hidden {
            opacity: 0;
            pointer-events: none;
            transform: translateY(-10px);
        }
        .info-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }
        .info-header h2 {
            font-size: 1.1rem;
            font-weight: 500;
            color: #e0e8f0;
            letter-spacing: 0.02em;
        }
        #info-close {
            background: none;
            border: none;
            color: rgba(255,255,255,0.3);
            font-size: 1.2rem;
            cursor: pointer;
            padding: 0 4px;
        }
        #info-close:hover {
            color: #fff;
        }
        #info-content {
            font-size: 0.85rem;
            line-height: 1.6;
        }
        #info-content .label {
            color: rgba(255,255,255,0.3);
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            margin-top: 8px;
        }
        #info-content .value {
            color: #d0d8e8;
        }
        /* Notification container */
        #notification-container {
            position: absolute;
            bottom: 100px;
            right: 420px;
            display: flex;
            flex-direction: column;
            gap: 6px;
            z-index: 15;
            pointer-events: none;
        }
        .notification-badge {
            background: rgba(20, 30, 50, 0.8);
            backdrop-filter: blur(8px);
            border-left: 3px solid #4a8fc7;
            padding: 6px 14px;
            border-radius: 8px;
            font-size: 0.75rem;
            color: #b0c8e8;
            animation: slideIn 0.4s ease;
            pointer-events: auto;
            cursor: default;
        }
        @keyframes slideIn {
            from { opacity: 0; transform: translateX(20px); }
            to { opacity: 1; transform: translateX(0); }
        }
        /* Sleep overlay */
        #sleep-overlay {
            display: none;
            position: absolute;
            inset: 0;
            background: rgba(10, 15, 30, 0.4);
            backdrop-filter: blur(2px);
            z-index: 5;
            pointer-events: none;
        }
        #sleep-overlay.active {
            display: block;
        }
        /* Controls */
        #controls {
            position: absolute;
            bottom: 30px;
            left: 30px;
            display: flex;
            gap: 12px;
            z-index: 10;
        }
        #controls button {
            background: rgba(20, 30, 50, 0.6);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 30px;
            padding: 6px 16px;
            color: #a0b0c8;
            font-size: 0.75rem;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
        }
        #controls button:hover {
            background: rgba(40, 60, 100, 0.5);
            border-color: rgba(120, 160, 255, 0.2);
        }
        #controls button.active {
            background: rgba(40, 80, 140, 0.3);
            border-color: rgba(120, 160, 255, 0.3);
            color: #8ab4f8;
        }
        /* Responsive */
        @media (max-width: 768px) {
            #conversation-panel {
                width: 280px;
                right: 16px;
                bottom: 16px;
                max-height: 240px;
            }
            #info-panel {
                width: 240px;
                left: 16px;
                top: 16px;
            }
            #notification-container {
                right: 320px;
                bottom: 80px;
            }
        }
    </style>
</head>
<body>
<div id="app">
    <!-- Graph Container -->
    <div id="mind-graph"></div>

    <!-- Conversation Panel -->
    <div id="conversation-panel">
        <div id="conversation-messages"></div>
        <div id="conversation-input">
            <input type="text" id="user-input" placeholder="Ask Jarvis…" />
            <button id="send-btn">→</button>
        </div>
    </div>

    <!-- Info Panel (hidden by default) -->
    <div id="info-panel" class="hidden">
        <div class="info-header">
            <h2 id="info-title">Node</h2>
            <button id="info-close">✕</button>
        </div>
        <div id="info-content"></div>
    </div>

    <!-- Sleep Overlay -->
    <div id="sleep-overlay"></div>

    <!-- Controls -->
    <div id="controls">
        <button id="sleep-toggle">💤 Sleep</button>
        <button id="memory-scan">🧠 Scan Memory</button>
        <button id="capability-exec">⚡ Run Capability</button>
        <button id="reflect-btn">🔄 Reflect</button>
    </div>

    <!-- Notification Container -->
    <div id="notification-container"></div>
</div>

<script>
    // ------------------------------------------------------------------
    // THE LIVING MIND – Full UI Logic
    // ------------------------------------------------------------------

    // ---- Cytoscape Graph Data ----
    const NODES = [
        { id: 'user', label: 'User', type: 'user', color: '#6a8cff' },
        { id: 'conversation', label: 'Conversation', type: 'conversation', color: '#8899cc' },
        { id: 'intent', label: 'Intent', type: 'executive', color: '#4a8fc7' },
        { id: 'goals', label: 'Goals', type: 'executive', color: '#4a8fc7' },
        { id: 'strategy', label: 'Strategy', type: 'executive', color: '#4a8fc7' },
        { id: 'planner', label: 'Planner', type: 'executive', color: '#4a8fc7' },
        { id: 'decision', label: 'Decision Engine', type: 'executive', color: '#4a8fc7' },
        { id: 'delegation', label: 'Delegation', type: 'executive', color: '#4a8fc7' },
        { id: 'execution', label: 'Execution', type: 'execution', color: '#4CAF50' },
        { id: 'reflection', label: 'Reflection', type: 'cognitive', color: '#9C27B0' },
        { id: 'learning', label: 'Learning', type: 'cognitive', color: '#9C27B0' },
        { id: 'knowledge', label: 'Knowledge', type: 'cognitive', color: '#9C27B0' },
        { id: 'workspace', label: 'Workspace', type: 'cognitive', color: '#9C27B0' },
        { id: 'memory', label: 'Memory', type: 'cognitive', color: '#9C27B0' },
        { id: 'capability_platform', label: 'Capability Platform', type: 'capability', color: '#FF9800' },
        { id: 'capability_resolver', label: 'Capability Resolver', type: 'capability', color: '#FF9800' },
        { id: 'capability_registry', label: 'Capability Registry', type: 'capability', color: '#FF9800' },
        { id: 'scheduler', label: 'Scheduler', type: 'execution', color: '#4CAF50' },
        { id: 'event_bus', label: 'Event Bus', type: 'infrastructure', color: '#78909C' },
        { id: 'system', label: 'System', type: 'infrastructure', color: '#78909C' },
    ];

    const EDGES = [
        { source: 'user', target: 'conversation' },
        { source: 'conversation', target: 'intent' },
        { source: 'intent', target: 'goals' },
        { source: 'goals', target: 'strategy' },
        { source: 'strategy', target: 'planner' },
        { source: 'planner', target: 'decision' },
        { source: 'decision', target: 'delegation' },
        { source: 'delegation', target: 'execution' },
        { source: 'execution', target: 'capability_platform' },
        { source: 'capability_platform', target: 'capability_resolver' },
        { source: 'capability_resolver', target: 'capability_registry' },
        { source: 'capability_platform', target: 'scheduler' },
        { source: 'scheduler', target: 'execution' },
        { source: 'execution', target: 'reflection' },
        { source: 'reflection', target: 'learning' },
        { source: 'learning', target: 'knowledge' },
        { source: 'knowledge', target: 'workspace' },
        { source: 'workspace', target: 'memory' },
        { source: 'memory', target: 'goals' },
        { source: 'event_bus', target: 'execution' },
        { source: 'event_bus', target: 'delegation' },
        { source: 'system', target: 'event_bus' },
        { source: 'system', target: 'capability_registry' },
    ];

    // ---- Init Cytoscape ----
    const graphContainer = document.getElementById('mind-graph');
    const cy = cytoscape({
        container: graphContainer,
        elements: [
            ...NODES.map(n => ({ data: { id: n.id, label: n.label, type: n.type, color: n.color } })),
            ...EDGES.map(e => ({ data: { source: e.source, target: e.target } })),
        ],
        style: [
            {
                selector: 'node',
                style: {
                    'background-color': 'data(color)',
                    'width': 48,
                    'height': 48,
                    'border-width': 2,
                    'border-color': 'rgba(255,255,255,0.15)',
                    'label': 'data(label)',
                    'font-size': '10px',
                    'color': '#b0c8e8',
                    'text-valign': 'bottom',
                    'text-halign': 'center',
                    'text-margin-y': 10,
                    'text-max-width': 80,
                    'text-wrap': 'wrap',
                    'text-justification': 'center',
                },
            },
            {
                selector: 'edge',
                style: {
                    'width': 1.5,
                    'line-color': 'rgba(120,160,255,0.2)',
                    'curve-style': 'bezier',
                    'target-arrow-shape': 'none',
                    'opacity': 0.6,
                },
            },
            {
                selector: 'node.user',
                style: {
                    'background-color': '#6a8cff',
                    'border-color': '#6a8cff',
                    'width': 56,
                    'height': 56,
                    'font-size': '12px',
                },
            },
            {
                selector: 'node.executive',
                style: { 'background-color': '#4a8fc7' },
            },
            {
                selector: 'node.cognitive',
                style: { 'background-color': '#9C27B0' },
            },
            {
                selector: 'node.capability',
                style: { 'background-color': '#FF9800' },
            },
            {
                selector: 'node.execution',
                style: { 'background-color': '#4CAF50' },
            },
            {
                selector: 'node.infrastructure',
                style: { 'background-color': '#78909C' },
            },
        ],
        layout: {
            name: 'cose',
            idealEdgeLength: 80,
            nodeRepulsion: 600,
            gravity: 0.2,
            numIter: 1000,
            animate: false,
        },
        zoom: 0.7,
        pan: { x: 0, y: -20 },
        minZoom: 0.4,
        maxZoom: 1.4,
    });

    // ---- Node State Management ----
    const nodeStates = {};

    function setNodeState(nodeId, state, duration = 1500) {
        const node = cy.getElementById(nodeId);
        if (!node.length) return;
        const colors = {
            idle: '#4a8fc7',
            thinking: '#ffffff',
            planning: '#FFD700',
            learning: '#9C27B0',
            executing: '#4CAF50',
            warning: '#FFA726',
            failure: '#EF5350',
            sleeping: '#80DEEA',
        };
        const bg = colors[state] || colors.idle;
        node.style('background-color', bg);
        if (state === 'thinking') {
            node.style('border-color', '#ffffff');
            node.style('border-width', 4);
            node.addClass('pulse');
            setTimeout(() => node.removeClass('pulse'), duration);
        } else {
            node.style('border-color', 'rgba(255,255,255,0.15)');
            node.style('border-width', 2);
            node.removeClass('pulse');
        }
        nodeStates[nodeId] = { state, timestamp: Date.now() };
    }

    // ---- Animations ----
    function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

    async function animateThinking() {
        const path = ['user', 'conversation', 'intent', 'goals', 'strategy', 'planner', 'decision', 'delegation', 'execution', 'capability_platform', 'capability_resolver', 'capability_registry', 'execution', 'reflection', 'learning', 'knowledge', 'workspace', 'memory'];
        NODES.forEach(n => setNodeState(n.id, 'idle'));
        for (const id of path) {
            setNodeState(id, 'thinking', 600);
            await sleep(300);
        }
        for (const id of path) {
            setNodeState(id, 'idle', 400);
            await sleep(100);
        }
    }

    async function animateMemoryScan() {
        const nodes = NODES.map(n => n.id).sort(() => Math.random() - 0.5);
        const selected = nodes.slice(0, 5);
        for (const id of selected) setNodeState(id, 'thinking', 800);
        await sleep(1200);
        const path = ['user', 'conversation', 'memory'];
        for (const id of path) {
            setNodeState(id, 'learning', 600);
            await sleep(200);
        }
        await sleep(1000);
        NODES.forEach(n => setNodeState(n.id, 'idle'));
    }

    async function animateCapabilityExecution() {
        const path = ['capability_platform', 'capability_resolver', 'capability_registry', 'execution'];
        for (const id of path) {
            setNodeState(id, 'executing', 600);
            await sleep(200);
        }
        await sleep(800);
        NODES.forEach(n => setNodeState(n.id, 'idle'));
    }

    async function animateReflection() {
        const cluster = ['reflection', 'learning', 'knowledge', 'workspace', 'memory'];
        for (const id of cluster) setNodeState(id, 'learning', 1200);
        await sleep(1500);
        NODES.forEach(n => setNodeState(n.id, 'idle'));
    }

    // ---- Sleep Mode ----
    let sleepMode = false;

    function toggleSleep() {
        sleepMode = !sleepMode;
        document.getElementById('sleep-overlay').classList.toggle('active', sleepMode);
        NODES.forEach(n => {
            const node = cy.getElementById(n.id);
            if (node.length) {
                if (sleepMode) {
                    node.style('background-color', '#80DEEA');
                    node.style('opacity', 0.7);
                } else {
                    node.style('background-color', n.color);
                    node.style('opacity', 1);
                }
            }
        });
    }

    // ---- Info Panel ----
    const infoPanel = document.getElementById('info-panel');
    const infoTitle = document.getElementById('info-title');
    const infoContent = document.getElementById('info-content');
    const infoClose = document.getElementById('info-close');

    cy.on('tap', 'node', (evt) => {
        const node = evt.target;
        const id = node.id();
        const data = node.data();
        const label = data.label || id;
        infoTitle.textContent = label;
        infoContent.innerHTML = `
            <div class="label">ID</div><div class="value">${id}</div>
            <div class="label">Type</div><div class="value">${data.type || 'unknown'}</div>
            <div class="label">State</div><div class="value">${nodeStates[id]?.state || 'idle'}</div>
            <div class="label">Connections</div><div class="value">${cy.edges(`[source="${id}"], [target="${id}"]`).length}</div>
            <div class="label">Description</div><div class="value">${getNodeDescription(id)}</div>
        `;
        infoPanel.classList.remove('hidden');
    });

    infoClose.addEventListener('click', () => infoPanel.classList.add('hidden'));

    function getNodeDescription(id) {
        const desc = {
            user: 'The human operator. The source of all interactions.',
            conversation: 'The current dialogue between Jarvis and the user.',
            intent: 'Interpretation of the user\'s goal and urgency.',
            goals: 'Active objectives. Each goal has a budget and priority.',
            strategy: 'High‑level plan to achieve the goals.',
            planner: 'Breaks goals into executable tasks.',
            decision: 'Commits to a specific course of action.',
            delegation: 'Directs tasks to capabilities and execution.',
            execution: 'Runs tasks, handles retries, monitors progress.',
            reflection: 'Reviews outcomes and identifies lessons.',
            learning: 'Integrates new knowledge and patterns.',
            knowledge: 'Stores facts, procedures, preferences, relationships.',
            workspace: 'Current mental state of Jarvis.',
            memory: 'Long‑term storage with semantic search.',
            capability_platform: 'Abstraction over all capabilities.',
            capability_resolver: 'Selects the best capability for a task.',
            capability_registry: 'Stores manifests and health of capabilities.',
            scheduler: 'Coordinates task timing and resource allocation.',
            event_bus: 'Central communication bus for all components.',
            system: 'The underlying operating system and infrastructure.',
        };
        return desc[id] || 'No description available.';
    }

    // ---- Notifications ----
    function addNotification(message) {
        const container = document.getElementById('notification-container');
        const badge = document.createElement('div');
        badge.className = 'notification-badge';
        badge.textContent = message;
        container.appendChild(badge);
        setTimeout(() => badge.remove(), 5000);
    }

    // ---- Conversation ----
    const messagesContainer = document.getElementById('conversation-messages');
    const userInput = document.getElementById('user-input');
    const sendBtn = document.getElementById('send-btn');

    function addMessage(text, sender) {
        const div = document.createElement('div');
        div.className = `message ${sender}`;
        div.textContent = text;
        messagesContainer.appendChild(div);
        messagesContainer.scrollTop = messagesContainer.scrollHeight;
    }

    async function handleSend() {
        const text = userInput.value.trim();
        if (!text) return;
        userInput.value = '';
        addMessage(text, 'user');
        await animateThinking();
        const responses = [
            'I\'ve considered that. Let me refine the approach.',
            'Interesting. I\'m cross‑referencing with past experiences.',
            'I\'ll need to consult the knowledge base. One moment.',
            'I\'ve found a relevant pattern. Let me explain.',
            'That requires a multi‑step plan. I\'ll delegate accordingly.',
            'I\'ve updated the workspace. Here\'s my reasoning.',
        ];
        const reply = responses[Math.floor(Math.random() * responses.length)];
        addMessage(reply, 'assistant');
        addNotification('Jarvis has completed your request.');
    }

    sendBtn.addEventListener('click', handleSend);
    userInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') handleSend();
    });

    // ---- Controls ----
    document.getElementById('sleep-toggle').addEventListener('click', toggleSleep);
    document.getElementById('memory-scan').addEventListener('click', animateMemoryScan);
    document.getElementById('capability-exec').addEventListener('click', animateCapabilityExecution);
    document.getElementById('reflect-btn').addEventListener('click', animateReflection);

    // ---- Live Drift ----
    setInterval(() => {
        cy.nodes().forEach(node => {
            node.position({
                x: node.position('x') + (Math.random() - 0.5) * 2,
                y: node.position('y') + (Math.random() - 0.5) * 2,
            });
        });
    }, 5000);

    // ---- Warmup ----
    setTimeout(() => {
        ['executive', 'cognitive', 'capability_platform', 'memory'].forEach(id => {
            setNodeState(id, 'idle');
        });
    }, 500);

    // ---- Background Activity ----
    setInterval(async () => {
        if (!sleepMode) {
            const r = Math.random();
            if (r < 0.2) await animateThinking();
            else if (r < 0.35) await animateMemoryScan();
            else if (r < 0.5) await animateReflection();
            if (Math.random() < 0.1) addNotification('Jarvis is processing background tasks.');
        }
    }, 30000);

    console.log('🧠 The Living Mind UI initialized.');
</script>
</body>
</html>
