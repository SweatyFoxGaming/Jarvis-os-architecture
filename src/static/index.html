<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JARVIS - Phoenix OS Web UI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0a0c10; color: white; }
        .panel { border: 2px solid #1f2937; background-color: #0d1117; }
        .aura-ring { border: 4px solid cyan; border-radius: 50%; width: 60px; height: 60px; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { transform: scale(0.9); opacity: 0.7; } 50% { transform: scale(1); opacity: 1; } 100% { transform: scale(0.9); opacity: 0.7; } }
    </style>
</head>
<body class="h-screen flex flex-col font-mono">
    <!-- Header -->
    <header class="p-4 border-b border-gray-800 flex justify-between items-center">
        <div class="flex items-center gap-4">
            <div class="aura-ring"></div>
            <h1 class="text-xl font-bold tracking-widest text-cyan-400">JARVIS COGNITIVE ENGINE</h1>
        </div>
        <div id="sys-status" class="text-xs text-gray-400">
            CPU: -- | RAM: -- | DISK: --
        </div>
    </header>

    <main class="flex-1 flex overflow-hidden p-4 gap-4">
        <!-- Chat Panel -->
        <section class="flex-1 panel flex flex-col rounded-lg overflow-hidden">
            <div class="bg-gray-800 p-2 text-xs font-bold px-4">JARVIS CHAT</div>
            <div id="chat-box" class="flex-1 overflow-y-auto p-4 space-y-4 text-sm">
                <div class="text-cyan-400">System: JARVIS Web interface initialized.</div>
            </div>
            <div class="p-4 border-t border-gray-800 flex gap-2">
                <input id="chat-input" type="text" class="flex-1 bg-black border border-gray-700 rounded p-2 focus:outline-none focus:border-cyan-400" placeholder="Type a message...">
                <button onclick="sendChat()" class="bg-cyan-600 hover:bg-cyan-500 px-4 py-2 rounded font-bold">SEND</button>
            </div>
        </section>

        <!-- Right Side: Status & Knowledge -->
        <aside class="w-80 flex flex-col gap-4">
            <div class="panel rounded-lg p-4 h-1/2 overflow-hidden flex flex-col">
                <div class="text-xs font-bold mb-2 text-gray-400 uppercase">System Health</div>
                <div id="stats-detail" class="space-y-2 text-sm">
                    <p>Core: Online</p>
                    <p>Uptime: Active</p>
                </div>
            </div>
            <div class="panel rounded-lg p-4 h-1/2 overflow-hidden flex flex-col">
                <div class="text-xs font-bold mb-2 text-gray-400 uppercase">Active Model</div>
                <div id="model-info" class="text-xs space-y-1 overflow-y-auto text-cyan-500 font-bold">
                    <p>Loading...</p>
                </div>
            </div>
        </aside>
    </main>

    <script>
        const chatBox = document.getElementById('chat-box');
        const chatInput = document.getElementById('chat-input');
        const sysStatus = document.getElementById('sys-status');

        async function sendChat() {
            const msg = chatInput.value.trim();
            if (!msg) return;
            chatInput.value = '';

            appendMessage('You', msg);

            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: msg })
                });
                const data = await response.json();
                appendMessage('JARVIS', data.response);
            } catch (err) {
                appendMessage('System', 'Error communicating with JARVIS.');
            }
        }

        function appendMessage(sender, text) {
            const div = document.createElement('div');
            div.innerHTML = `<b class="${sender === 'You' ? 'text-white' : 'text-cyan-400'}">${sender}:</b> ${text}`;
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        async function updateStatus() {
            try {
                const res = await fetch('/api/status');
                const data = await res.json();
                sysStatus.innerText = `CPU: ${data.cpu}% | RAM: ${data.ram_available}MB | DISK: ${data.disk}%`;
            } catch {}
        }

        async function fetchModels() {
            try {
                const res = await fetch('/v1/models');
                const data = await res.json();
                document.getElementById('model-info').innerHTML = `<p>• ${data.data[0].id}</p>`;
            } catch {
                document.getElementById('model-info').innerHTML = `<p class="text-red-500">• API Offline</p>`;
            }
        }

        chatInput.addEventListener('keypress', (e) => { if(e.key === 'Enter') sendChat(); });
        setInterval(updateStatus, 5000);
        updateStatus();
        fetchModels();
    </script>
</body>
</html>
